<!DOCTYPE html>
<html>

<head>

<title>Donor Dashboard</title>

<link rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">

</head>


<body>


<div class="form-container">
    {% with messages = get_flashed_messages() %}

    {% if messages %}

    {% for msg in messages %}

    <p style="color:green;">
    {{msg}}
    </p>

    {% endfor %}

    {% endif %}

    {% endwith %}


<h2>
Welcome {{user.name}} 👋
</h2>


<h3>
Add Food Donation
</h3>



<form method="POST" action="/add_food" enctype="multipart/form-data">


<input type="text"
name="food_name"
placeholder="Food Name"
required>



<input type="text"
name="quantity"
placeholder="Quantity"
required>



<select name="category">

<option value="Rice">Rice</option>

<option value="Vegetables">
Vegetables
</option>

<option value="Fruits">
Fruits
</option>

<option value="Other">
Other
</option>

</select>



<input type="text"
name="expiry_time"
placeholder="Expiry / Preparation Time">



<input type="text"
name="address"
placeholder="Pickup Address">



<input type="text"
name="contact"
placeholder="Contact Number">

<label>Upload Food Image</label>

<input type="file" name="image" required>

<br><br>


<button type="submit">
Donate Food
</button>


</form>


<br>
<a href="/donor_requests">
View Food Requests
</a>
<br><br>

<a href="/logout">
Logout
</a>


</div>


</body>

</html>
